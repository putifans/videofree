<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <titleVideo</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #000;
        }

        /* Título en VERDE */
        .header {
            background-color: black;
            color: #00ff00; 
            text-align: center;
            padding: 15px 0;
            font-size: 24px;
            font-weight: bold;
        }

        /* Iframe con tamaño del 70% de la pantalla */
        .iframe-section {
            height: 70vh; 
            background-color: #ffeb00;
            padding: 10px;
            display: flex;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 2px solid #000;
            border-radius: 5px;
            background-color: #fff;
        }

        /* Sección de video: Ahora se adapta al contenido */
        .video-section {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            background-color: #111;
        }

        /* Quitamos el aspecto fijo para que use el del video original */
        video {
            max-width: 100%;
            max-height: 100%; /* Para que no empuje el iframe hacia arriba */
            height: auto; 
            width: auto;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,255,0,0.2); /* Sutil brillo verde */
        }
    </style>
</head>
<body>

    <div class="header">
        Bienvenido a mi Blog
    </div>

    <div class="iframe-section">
        <iframe src="https://criptoeth.bitcotasks.com"></iframe>
    </div>

    <div class="video-section">
        <video controls>
            <source src="https://qu.ax/hllt0.mp4" type="video/mp4">
            Tu navegador no soporta video.
        </video>
    </div>

</body>
</html>
