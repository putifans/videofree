<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Video</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
        }

        .video-wrapper {
            width: 100%;
            max-width: 800px; /* Puedes ajustar este valor según el ancho máximo deseado */
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <video controls preload="metadata">
            <source src="https://qu.ax/5LNM8.mp4" type="video/mp4">
            Tu navegador no soporta el formato de video.
        </video>
    </div>

</body>
</html>
