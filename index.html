<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog con Espacio Optimizado</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Ocupa el 100% de la ventana */
            background-color: #000;
            overflow: hidden; /* Evita scroll doble en la página principal */
        }

        .header {
            background-color: #000;
            color: #fff;
            text-align: center;
            padding: 12px;
            font-size: 20px;
            font-weight: bold;
        }

        /* SECCIÓN IFRAME: Ahora tiene prioridad */
        .iframe-section {
            flex: 3; /* Esto hace que sea 3 veces más grande que el video */
            background-color: #ffeb00;
            padding: 10px;
            display: flex;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 4px;
            background: #fff;
        }

        /* SECCIÓN VIDEO: Tamaño controlado */
        .video-section {
            flex: 1; /* Ocupa el espacio restante de forma moderada */
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            border-top: 2px solid #333;
        }

        .aspect-box {
            height: 90%; /* Forzamos a que no crezca más que su contenedor */
            aspect-ratio: 16 / 9;
            background-color: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="header">Bienvenido a mi Blog</div>

    <div class="iframe-section">
        <iframe src="https://criptoeth.bitcotasks.com"></iframe>
    </div>

    <div class="video-section">
        <div class="aspect-box">
            <video controls>
                <source src="https://qu.ax/hllt0.mp4" type="video/mp4">
            </video>
        </div>
    </div>

</body>
</html>
