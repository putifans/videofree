<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Blog Personalizado</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #000;
        }

        /* Encabezado con texto VERDE */
        .header {
            background-color: black;
            color: #00ff00; /* Color verde */
            text-align: center;
            padding: 20px 0;
            font-size: 24px;
            font-weight: bold;
        }

        /* Área del Iframe fija al 70% de la altura de la pantalla */
        .iframe-section {
            height: 70vh; 
            background-color: #ffeb00;
            padding: 15px;
            display: flex;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 2px solid #000;
            border-radius: 8px;
            background-color: #fff;
        }

        /* Área del Reproductor basada en el tamaño del video */
        .video-section {
            flex-grow: 1; /* Ocupa el resto del espacio */
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .video-wrapper {
            width: 100%;
            max-width: 700px; /* Limita el ancho para que no se vea gigante */
            aspect-ratio: 16 / 9;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Mantiene el tamaño original sin deformar */
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        Bienvenido a mi Blog
    </div>

    <div class="iframe-section">
        <iframe src="https://criptoeth.bitcotasks.com" title="Contenido Blog"></iframe>
    </div>

    <div class="video-section">
        <div class="video-wrapper">
            <video controls>
                <source src="https://qu.ax/hllt0.mp4" type="video/mp4">
                Tu navegador no soporta video.
            </video>
        </div>
    </div>

</body>
</html>
